      for (let i = 1; i < s.points.length; i++) octx.lineTo(s.points[i].x * sx, s.points[i].y * sy);
      if (s.points.length === 1) octx.lineTo(s.points[0].x * sx + 0.1, s.points[0].y * sy);
      octx.stroke();
    }
    ctx.drawImage(off, 0, 0);

    // Draw patches on top
    for (const s of strokes) {
      if (!s.isPatch || !s.patchDataUrl) continue;
      const pImg = new Image();
      pImg.src = s.patchDataUrl;
      // Synchronous draw works if image is already loaded (data URL)
      ctx.drawImage(pImg, s.x * sx, s.y * sy, s.w * sx, s.h * sy);
    }
  }

  // ── ML: Extract ──────────────────────────────────────────────────────────
  async function runExtract() {
    if (!items.length) return;
    const visible = getVisibleItems();
    if (!visible.length) return;
    if (!confirm('Extract will OCR and inpaint the visible image(s). This may take a long time and will replace all current bounding boxes.\n\nContinue?')) return;
    extractBtn.disabled = true;
    pushUndo();
    try {
      for (let vi = 0; vi < visible.length; vi++) {
        const item = visible[vi];
        mlStatus.textContent = `Extracting ${vi + 1}/${visible.length}...`;
        const result = await ML.extract(item.src,
          msg => { mlStatus.textContent = `[${vi + 1}/${visible.length}] ${msg}`; });

        // Set bboxes from OCR
        item.bboxes = result.bboxes;
        item.textOffsets = result.bboxes.map(() => ({ dx: 0, dy: 0 }));
        item.rotations = result.bboxes.map(() => 0);
        item.customs = result.bboxes.map(() => null);
        item.labelRects = [];

        // Add inpaint patches as strokes (not replacing image)
        if (!item.strokes) item.strokes = [];
        for (const p of result.patches) {
          item.strokes.push({ isPatch: true, patchDataUrl: p.dataUrl, x: p.x, y: p.y, w: p.w, h: p.h });
        }
      }
      renderItem();
      saveProjectData();
      mlStatus.textContent = `Extracted ${visible.length} image(s).`;
    } catch (err) {
      console.error('Extract error:', err);
      mlStatus.textContent = 'Extract failed: ' + err.message;
    }
    extractBtn.disabled = false;
    setTimeout(() => { mlStatus.textContent = ''; }, 5000);
  }

  // ── Undo / Redo ───────────────────────────────────────────────────────────
  function snapshotState() {
    return JSON.parse(JSON.stringify(items.map(it => ({
      bboxes: it.bboxes, textOffsets: it.textOffsets, rotations: it.rotations,
      strokes: it.strokes, customs: it.customs,
    }))));
  }
  function pushUndo() {
    undoStack.push(snapshotState());
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack.length = 0;
  }
  function undo() {
    if (!undoStack.length) return;
    redoStack.push(snapshotState());
    const snap = undoStack.pop();
    snap.forEach((s, i) => { if (items[i]) Object.assign(items[i], s); });
    customizeTarget = null;
    syncToolbar(); redrawAll(); saveProjectData();
  }
  function redo() {
    if (!redoStack.length) return;
    undoStack.push(snapshotState());
    const snap = redoStack.pop();
    snap.forEach((s, i) => { if (items[i]) Object.assign(items[i], s); });
    customizeTarget = null;
    syncToolbar(); redrawAll(); saveProjectData();
  }

  // ── Customize helpers ────────────────────────────────────────────────────
  function ensureCustom(item, bboxIdx) {
    if (!item.customs) item.customs = item.bboxes.map(() => null);
    if (!item.customs[bboxIdx]) item.customs[bboxIdx] = {};
    return item.customs[bboxIdx];
  }
  // Track whether we already pushed undo for the current continuous interaction (e.g. color drag)
  let _custUndoPushed = false;
  function applySetting(key, value) {
    if (customizeTarget) {
      if (!_custUndoPushed) { pushUndo(); _custUndoPushed = true; }
      const c = ensureCustom(customizeTarget.item, customizeTarget.bboxIdx);
      c[key] = value;
      redrawAll(); saveProjectData();
    } else {
      redrawAll(); saveSettings();
    }
  }
  // Reset the flag on mouseup / change end so next interaction gets a fresh undo
  document.addEventListener('mouseup', () => { _custUndoPushed = false; });
  document.addEventListener('change', () => { _custUndoPushed = false; });

  // Update toolbar controls to reflect customize target or global values
  function syncToolbar() {
    if (customizeTarget) {
      const c = customizeTarget.item.customs?.[customizeTarget.bboxIdx];
      fontSelect.value       = c?.textFont       ?? textFont;
      textColorPick.value    = c?.textColor      ?? textColor;
      bgColorPick.value      = c?.bgColor        ?? bgColor;
      strokeColorPick.value  = c?.strokeColor    ?? strokeColor;
      uppercaseBtn.classList.toggle('active', c?.textUppercase ?? textUppercase);
    } else {
      fontSelect.value       = textFont;
      textColorPick.value    = textColor;
      bgColorPick.value      = bgColor;
      strokeColorPick.value  = strokeColor;
      uppercaseBtn.classList.toggle('active', textUppercase);
    }
  }

  // ── Controls ──────────────────────────────────────────────────────────────
  function setActiveTool(tool) {
    activeTool = tool;
    addBtn.classList.toggle('active', tool === 'add');
    brushBtn.classList.toggle('active', tool === 'brush');
    eraserBtn.classList.toggle('active', tool === 'eraser');
    inpaintBtn.classList.toggle('active', tool === 'inpaint');
    cloneBtn.classList.toggle('active', tool === 'clone');
    if (tool !== 'add') addDraw = null;
    if (tool !== 'inpaint') inpaintStrokes = [];
    if (tool !== 'clone') cloneDrawing = null;
  }

  function toggleAddMulti() {
    addMulti = !addMulti;
    addMultiBtn.classList.toggle('active', addMulti);
  }

  function toggleAutoHide() {
    autoHideBar = !autoHideBar;
    autohideBtn.classList.toggle('active', autoHideBar);
    document.body.classList.toggle('autohide-bar', autoHideBar);
    if (!autoHideBar) headerBar.classList.remove('bar-visible');
    saveSettings();
  }

  function navigate(dir) {
    if (viewMode === 'all') return;
    const step = navStep();
    const next = currentIndex + dir * step;
    if (next < 0 || next >= items.length) return;
    currentIndex = next;
    renderItem();
    saveProjectData();
  }

  function toggleShowBBs() {
    showBoxes = !showBoxes;
    showBBBtn.classList.toggle('active', showBoxes);
    redrawAll(); saveSettings();
  }

  function toggleShowOutlines() {
    showOutlines = !showOutlines;
    showOutlineBtn.classList.toggle('active', showOutlines);
    redrawAll(); saveSettings();
  }

  function toggleUppercase() {
    if (customizeTarget) {
      pushUndo();
      const c = ensureCustom(customizeTarget.item, customizeTarget.bboxIdx);
      const newVal = !(c.textUppercase ?? textUppercase);
      c.textUppercase = newVal;
      uppercaseBtn.classList.toggle('active', newVal);
      redrawAll(); saveProjectData();
      return;
    } else {
      textUppercase = !textUppercase;
      uppercaseBtn.classList.toggle('active', textUppercase);
      redrawAll(); saveSettings();
    }
  }

  function changeTextSize(delta) {
    if (customizeTarget) {
      const c = ensureCustom(customizeTarget.item, customizeTarget.bboxIdx);
      applySetting('textSizeDelta', Math.max(TEXT_MIN, Math.min(TEXT_MAX, (c.textSizeDelta ?? textSizeDelta) + delta)));
    } else {
      textSizeDelta = Math.max(TEXT_MIN, Math.min(TEXT_MAX, textSizeDelta + delta));
      redrawAll(); saveSettings();
    }
  }

  function changeLineHeight(delta) {
    if (customizeTarget) {
      const c = ensureCustom(customizeTarget.item, customizeTarget.bboxIdx);
      applySetting('lineHeightDelta', (c.lineHeightDelta ?? lineHeightDelta) + delta);
    } else {
      lineHeightDelta += delta;
      redrawAll(); saveSettings();
    }
  }

  function changeBgOpacity(delta) {
    if (customizeTarget) {
      const c = ensureCustom(customizeTarget.item, customizeTarget.bboxIdx);
      applySetting('bgOpacity', Math.max(0, Math.min(1, (c.bgOpacity ?? bgOpacity) + delta)));
    } else {
      bgOpacity = Math.max(0, Math.min(1, bgOpacity + delta));
      redrawAll(); saveSettings();
    }
  }

  function changeStrokeWidth(delta) {
    if (customizeTarget) {
      const c = ensureCustom(customizeTarget.item, customizeTarget.bboxIdx);
      applySetting('strokeWidth', Math.max(0, (c.strokeWidth ?? strokeWidth) + delta));
    } else {
      strokeWidth = Math.max(0, strokeWidth + delta);
      redrawAll(); saveSettings();
    }
  }

  function toggleFit() {
    fitToPage = !fitToPage;
    fitBtn.classList.toggle('active', fitToPage);
    mainArea.classList.toggle('actual-size', !fitToPage);
    saveSettings();
    requestAnimationFrame(() => requestAnimationFrame(redrawAll));
  }

  function setViewMode(mode) {
    viewMode = mode;

    singleBtn.classList.toggle('radio-active', mode === 'single');
    doubleBtn.classList.toggle('radio-active', mode === 'double-comic');
    mangaBtn.classList.toggle('radio-active',  mode === 'double-manga');
    allBtn.classList.toggle('radio-active',    mode === 'all');

    mainArea.classList.toggle('webtoon-mode', mode === 'all');
    saveSettings();

    if (!items.length) { updateControls(); return; }

    if (mode === 'all') {
      viewer.classList.remove('visible');
      renderWebtoon();
    } else {
      webtoonView.classList.remove('visible');
      webtoonSlots = [];
      renderItem();
    }
  }

  // ── Settings persistence ───────────────────────────────────────────────────
  function saveSettings() {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      showBoxes, showOutlines, textSizeDelta, lineHeightDelta,
      textUppercase, textFont, fitToPage, viewMode,
      textColor, bgColor, bgOpacity,
      strokeColor, strokeWidth, autoHideBar,
      brushColor, brushSize,
    }));
  }

  // ── IndexedDB persistence (no size limit, unlike localStorage) ──────────
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => { req.result.createObjectStore(DB_STORE); };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function saveProjectData() {
    // Debounce: only save 500ms after the last call
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(_doSaveProject, 500);
  }
  function _doSaveProject() {
    const data = items.map(it => ({
      name: it.name, fileName: it.fileName, src: it.src,
      bboxes: it.bboxes, textOffsets: it.textOffsets, rotations: it.rotations,
      strokes: it.strokes || [], customs: it.customs || [],
    }));
    // Save to IndexedDB (async, large capacity)
    openDB().then(db => {
      const tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put({ items: data, currentIndex }, 'project');
      tx.oncomplete = () => db.close();
    }).catch(e => console.warn('saveProjectData IndexedDB failed:', e));

    // Also save metadata (without images) to localStorage as sync backup
    try {
      const meta = items.map(it => ({
        name: it.name, fileName: it.fileName,
        bboxes: it.bboxes, textOffsets: it.textOffsets, rotations: it.rotations,
        customs: it.customs || [],
        // Don't save src or strokes to localStorage (too large)
      }));
      localStorage.setItem(PROJECT_KEY, JSON.stringify({ meta, currentIndex }));
    } catch (_) {}
  }

  function loadProjectData() {
    return openDB().then(db => {
      return new Promise(resolve => {
        const tx = db.transaction(DB_STORE, 'readonly');
        const req = tx.objectStore(DB_STORE).get('project');
        req.onsuccess = () => {
          db.close();
          const p = req.result;
          if (!p || !Array.isArray(p.items) || !p.items.length) {
            console.log('[Persist] No project data in IndexedDB');
            resolve(false); return;
          }
          console.log(`[Persist] Loaded ${p.items.length} items from IndexedDB`);
          items = p.items.map(it => ({
            name: it.name, fileName: it.fileName, src: it.src,
            bboxes: it.bboxes || [],
            textOffsets: it.textOffsets || (it.bboxes||[]).map(() => ({ dx: 0, dy: 0 })),
            rotations: it.rotations || (it.bboxes||[]).map(() => 0),
            strokes: it.strokes || [],
            customs: it.customs || [],
            labelRects: [],
          }));
          currentIndex = p.currentIndex || 0;
          if (currentIndex >= items.length) currentIndex = 0;

          // Pre-cache all patch images before rendering
          const patchPromises = [];
          for (const it of items) {
            for (const s of (it.strokes || [])) {
              if (s.isPatch && s.patchDataUrl) {
                const img = new Image();
                patchImageCache.set(s.patchDataUrl, img);
                patchPromises.push(new Promise(r => { img.onload = r; img.onerror = r; img.src = s.patchDataUrl; }));
              }
            }
          }

          // Render after all patches are loaded
          Promise.all(patchPromises).then(() => {
            document.body.classList.add('has-images');
            renderItem();
            resolve(true);
          });
        };
        req.onerror = () => { db.close(); console.warn('[Persist] IndexedDB read error'); resolve(false); };
      });
    }).catch(e => { console.warn('[Persist] IndexedDB open failed:', e); return false; });
  }

  function loadSettings() {
    let s;
    try { s = JSON.parse(localStorage.getItem(SETTINGS_KEY)); } catch {}
    if (!s) return;
    if (s.showBoxes      != null) { showBoxes     = s.showBoxes;     showBBBtn.classList.toggle('active', showBoxes); }
    if (s.showOutlines   != null) { showOutlines  = s.showOutlines;  showOutlineBtn.classList.toggle('active', showOutlines); }
    if (s.textSizeDelta  != null)   textSizeDelta  = s.textSizeDelta;
    if (s.lineHeightDelta!= null)   lineHeightDelta= s.lineHeightDelta;
    if (s.textUppercase  != null) { textUppercase = s.textUppercase; uppercaseBtn.classList.toggle('active', textUppercase); }
    if (s.textFont       != null) { textFont      = s.textFont;      fontSelect.value = textFont; }
    if (s.textColor      != null) { textColor     = s.textColor;     textColorPick.value = textColor; }
    if (s.bgColor        != null) { bgColor       = s.bgColor;       bgColorPick.value   = bgColor; }
    if (s.bgOpacity      != null)   bgOpacity      = s.bgOpacity;
    if (s.strokeColor    != null) { strokeColor   = s.strokeColor;   strokeColorPick.value = strokeColor; }
    if (s.strokeWidth    != null)   strokeWidth    = s.strokeWidth;
    if (s.autoHideBar   != null) {
      autoHideBar = s.autoHideBar;
      autohideBtn.classList.toggle('active', autoHideBar);
      document.body.classList.toggle('autohide-bar', autoHideBar);
    }
    if (s.brushColor     != null) { brushColor    = s.brushColor;    brushColorPick.value = brushColor; }
    if (s.brushSize      != null) { brushSize     = s.brushSize;     brushSizeSlider.value = brushSize; }
    if (s.fitToPage      != null) {
      fitToPage = s.fitToPage;
      fitBtn.classList.toggle('active', fitToPage);
      mainArea.classList.toggle('actual-size', !fitToPage);
    }
    if (s.viewMode != null) {
      viewMode = s.viewMode;
      singleBtn.classList.toggle('radio-active', viewMode === 'single');
      doubleBtn.classList.toggle('radio-active', viewMode === 'double-comic');
      mangaBtn.classList.toggle('radio-active',  viewMode === 'double-manga');
      allBtn.classList.toggle('radio-active',    viewMode === 'all');
      mainArea.classList.toggle('webtoon-mode',  viewMode === 'all');
    }
  }

  function updateControls() {
    const isAll = viewMode === 'all';
    const step  = navStep();
    prevBtn.disabled = isAll || currentIndex < step;
    nextBtn.disabled = isAll || currentIndex + step >= items.length;
  }
</script>

</body>
</html>
